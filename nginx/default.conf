server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    # -----------------------------------------------
    # URL REWRITING SEO-FRIENDLY
    # /articles/accord-politique-en-espagne-3.html
    # → /article.php (qui récupère l'ID depuis l'URL)
    # -----------------------------------------------
    location ~ ^/articles/ {
        rewrite ^/articles/(.+)\.html$ /article.php last;
    }

    # Augmenter la limite d'upload (20MB ici)
    client_max_body_size 20M;

    # Gzip compression pour performance
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    # Dossier uploads - fichiers statiques
    location /uploads/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers statiques (cache navigateur)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\. {
        deny all;
    }
}