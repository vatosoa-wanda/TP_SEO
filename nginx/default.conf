server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    # Gzip compression pour performance
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    # URL Rewriting SEO : /article/id/slug
    location ~ ^/article/([0-9]+)/([a-z0-9-]+)$ {
        rewrite ^/article/([0-9]+)/([a-z0-9-]+)$ /article.php?id=$1&slug=$2 last;
    }

    # Dossier uploads - fichiers statiques
    location /uploads/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers statiques (cache navigateur)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\. {
        deny all;
    }
}